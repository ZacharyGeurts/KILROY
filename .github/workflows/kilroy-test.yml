name: KILROY Field OS CI

on:
  push:
    paths:
      - '**'
  pull_request:
    paths:
      - '**'
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4

      - name: Install build deps
        run: |
          sudo apt-get update
          sudo apt-get install -y flex bison bc gcc make \
            libssl-dev libelf-dev python3 cpio gzip \
            parted mtools git qemu-system-x86 unzip curl

      - name: Compat substrate
        run: |
          # Workflow assumes repo root is KILROY or contains SG/KILROY
          if [[ -f SG/KILROY/scripts/ci-run.sh ]]; then
            cd SG/KILROY
          fi
          ./scripts/kilroy-compat-link.sh || true
          ./scripts/kilroy-stage-compat.sh || echo "substrate from tarball/cache"

      - name: Test suite
        run: |
          if [[ -f SG/KILROY/scripts/ci-run.sh ]]; then
            cd SG/KILROY
          fi
          export FULL_BUILD=1
          export GROK_FULL_BUILD=0
          ./scripts/ci-run.sh

      - name: ioctl smoke binary
        run: |
          if [[ -f SG/KILROY/scripts/test-ioctl-smoke.sh ]]; then
            cd SG/KILROY
          fi
          ./scripts/test-ioctl-smoke.sh