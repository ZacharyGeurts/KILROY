# Grok Bootloader — base (composed into grok.conf)
# Edit themes in themes/<name>/ or entries in grok.entries.conf
# Rebuild: ./scripts/grok-compose.sh

timeout: 8
quiet: no
verbose: no
default_entry: 3
remember_last_entry: yes
serial: yes
serial_baudrate: 115200

# Intuitive in-place editor (E key) — syntax highlight + validation on
editor_enabled: yes
editor_highlighting: yes
editor_validation: yes

# Mandatory integrity — tampered config panics (pair with limine enroll-config for SB)
hash_mismatch_panic: yes

interface_branding: GROK · KILROY Field OS
interface_branding_colour: 6
interface_resolution: 1280x720

# Theme tokens — grok-compose.sh fills ${GROK_THEME_*}
wallpaper: ${GROK_THEME_WALLPAPER}
wallpaper_style: stretched
backdrop: ${GROK_THEME_BACKDROP}

term_palette: ${GROK_THEME_PALETTE}
term_palette_bright: ${GROK_THEME_PALETTE_BRIGHT}
term_background: ${GROK_THEME_BG}
term_foreground: ${GROK_THEME_FG}
term_background_bright: ${GROK_THEME_BG_BRIGHT}
term_foreground_bright: ${GROK_THEME_FG_BRIGHT}
term_margin: 40
term_margin_gradient: 20
term_font_scale: 2x2