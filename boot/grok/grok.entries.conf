# Grok boot menu — clean, intuitive. Arrow keys · Enter · E=edit · S=switch entry

/+About Grok
comment: Press ↑↓ move · Enter boot · E edit cmdline in-place · S pick entry · T timeout
         Themes: field midnight dawn mono — see /boot/grok/themes/
         Security: mandatory BIOS settings — read security/MANIFEST before waiving

/Grok — security & BIOS (read first)
comment: MANDATORY firmware: Secure Boot ON · TPM 2.0 ON · IOMMU/VT-d ON · NX ON
         MINOR: disable CSM · disable Fast Boot · set firmware password · USB after disk
         INSECURE? Fix BIOS setup — do not waive unless you understand risk.
         Run on host: ./scripts/grok-firmware-audit.sh
protocol: linux
path: boot():/boot/kilroy/bzImage
cmdline: root=LABEL=KILROY_FIELD rw quiet splash loglevel=3 kilroy.field=1 grok.security=strict

/KILROY Field
comment: Grok → KILROY Field OS · kilroy-field-1.0 · strict · uname shows KILROY
protocol: linux
path: boot():/boot/kilroy/bzImage
module_path: boot():/boot/kilroy/initramfs.cpio.gz
cmdline: root=LABEL=KILROY_FIELD rw quiet splash loglevel=3 kilroy.field=1 grok.security=strict

/KILROY Field (QEMU ramdisk)
comment: Grok smoke — initrd + /dev/ram0 · Field init prints /proc/kilroy_field
protocol: linux
path: boot():/boot/kilroy/bzImage
module_path: boot():/boot/kilroy/initramfs.cpio.gz
cmdline: root=/dev/ram0 rw init=/init console=ttyS0 kilroy.field=1 grok.security=strict

/KILROY Field (safe)
comment: Grok safe mode — single user, no splash, strict security
protocol: linux
path: boot():/boot/kilroy/bzImage
cmdline: root=LABEL=KILROY_FIELD rw single kilroy.field=1 grok.security=strict

/KILROY Field (recovery)
comment: Grok recovery shell — fix rootfs, then reboot into strict entry
protocol: linux
path: boot():/boot/kilroy/bzImage
cmdline: root=LABEL=KILROY_FIELD rw init=/bin/sh kilroy.field=1 grok.security=strict

/+Speedups (BIOS hints)
comment: Suggested: Resize BAR/ReBAR ON · Above 4G Decoding ON · ASPM L1 for GPU
         NVMe: native mode · PCIe max link · EPP performance · disable legacy USB

/Memtest (RAM check)
comment: Grok wish #83 — memtest86+ when image at /boot/memtest/memtest86+.efi
protocol: efi
path: boot():/boot/memtest/memtest86+.efi
# alt: boot():/boot/memtest86+x64.efi when installed via apt

/KILROY snapshot (wish #84)
comment: Boot read-only root snapshot — btrfs subvol @kilroy_snap when present
protocol: linux
path: boot():/boot/kilroy/bzImage
cmdline: root=LABEL=KILROY_FIELD ro kilroy.field=1 grok.security=strict rootflags=subvol=@kilroy_snap

/PXE network boot (wish #82)
comment: Grok PXE — serve grok.conf + bzImage via iPXE on lab network
protocol: pxe
pxe: yes

/Boot waived (insecure — fix BIOS)
comment: WAIVED mandatory checks. You accepted insecure firmware. Fix BIOS ASAP.
protocol: linux
path: boot():/boot/kilroy/bzImage
cmdline: root=LABEL=KILROY_FIELD rw quiet kilroy.field=1 grok.security=waived

/Grok options
comment: Reboot · power off · edit grok.conf in-place (E) · themes in /boot/grok/themes/